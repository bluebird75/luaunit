name: CI

on:
  push:
    branches: [main, reboot_ci]
  pull_request:
    branches: [main, reboot_ci]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  lua:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            luaVersion: 5.1
          - os: ubuntu-latest
            luaVersion: 5.2
          - os: ubuntu-latest
            luaVersion: 5.3
          - os: ubuntu-latest
            luaVersion: 5.4
          - os: ubuntu-latest
            luaVersion: luajit-2.0
          - os: macos-latest
            luaVersion: 5.4
          - os: windows-latest
            luaVersion: 5.4
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup msvc dev cmd
        uses: ilammy/msvc-dev-cmd@v1

      - name: setup lua
        uses: leafo/gh-actions-lua@v12
        with:
          luaVersion: ${{ matrix.luaVersion }}

      - name: show lua version
        run: lua -v

      - name: run tests
        run: lua run_unit_tests.lua --shuffle
        

# Combination matrix:
#
# Lua         | float/double | Linux     | Windows    | MacOSX    |
# ------------|--------------|------------------------------------|
# Lua 5.1     | float        |           |            |           |
#             | double       |    X      |     X      |    X      |
# ------------|--------------|------------------------------------|
# Lua 5.2     | float        |    X      |            |           |
#             | double       |           |            |           |
# ------------|--------------|------------------------------------|
# Lua 5.3     | float        |           |            |    X      |
#             | double       |           |            |           |
# ------------|--------------|------------------------------------|
# Lua 5.4     | float        |           |            |           |
#             | double       |     X     |      X     |    X      |
# ------------|--------------|------------------------------------|
# LuaJit 2.0  | N.A.         |     X     |            |           |
# ------------|--------------|------------------------------------|
#
# Strategy:
# - oldest and newest version are tested on all platform, in default configuration (double)
# - Each of lua 5.2, lua 5.3, luajit 2.0 is tested only on one platforms
# - float is tested on two platform

